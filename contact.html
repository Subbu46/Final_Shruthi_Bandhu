<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Shruthi Bandhu</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="d-flex justify-content-between align-items-center p-3">
        <h1>Shruthi Bandhu</h1>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    </header>
    <div class="container-fluid p-5">
        <h2 class="text-center">Contact Us</h2>
        <div class="row">
            <div class="col-md-6">
                <h4>Get in Touch</h4>
                <p>We'd love to hear from you! Send us a message or reach out via social media.</p>
                <p><i class="fas fa-map-marker-alt"></i> 123 Accessibility Lane, Tech City, India</p>
                <p><i class="fas fa-envelope"></i> support@shruthibandhu.com</p>
                <p><i class="fas fa-phone"></i> +91-123-456-7890</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                </div>
            </div>
            <div class="col-md-6">
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Shruthi Bandhu. All rights reserved.</p>
        <a href="#" data-i18n="privacy">Privacy Policy</a> | <a href="#" data-i18n="terms">Terms of Service</a>
        <div class="social-icons">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div id="snackbar" style="
    visibility: hidden;
    min-width: 260px;
    background: #3b82f6;
    color: white;
    text-align: center;
    border-radius: 6px;
    padding: 14px;
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    font-size: 15px;
    z-index: 9999;
"
></div>

<script src="js/snackbar.js"></script>

</body>
</html>

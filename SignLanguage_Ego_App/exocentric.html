<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exocentric Conversion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
<header class="top-bar">
    <h2>Exocentric Conversion</h2>
    <a href="/" class="back-btn">← Back</a>
</header>

<div class="main-container">
    <div class="camera-container">
        <video id="exoVideo" autoplay playsinline class="rounded shadow"></video>
    </div>

    <div class="controls">
        <button id="audioToggle">Disable Audio</button>
    </div>

    <div id="outputBox" class="output waiting">
        Waiting for gesture...
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</html>

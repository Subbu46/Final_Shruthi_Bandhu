<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shruthi Bandhu</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css"> 
    <script type="module" src="js/firebase-config.js"></script>

    <style>
        /* Force clean background & layout */
        body {
            background: #f0f2f5 !important;
            background-image: none !important;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto;
        }

        .container, .auth-wrapper {
            background-image: none !important;
            background-color: transparent !important;
            box-shadow: none !important;
            min-height: auto !important;
        }
        
        header {
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            /* align-items: center; REMOVED to prevent clipping */
            padding: 20px;
            padding-top: 80px; /* Space for header */
            padding-bottom: 40px;
        }

        .auth-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            border: 1px solid #e1e4e8;
            margin: auto; /* Centers vertically */
        }

        .btn-primary { background: #3b82f6 !important; border: none; font-weight: 600; }
        .btn-google { background: white !important; color: #444 !important; border: 1px solid #ddd !important; font-weight: 500; }
        
        .btn-back-home {
            background-color: white !important;
            color: #3b82f6 !important;
            border: none !important;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;
            font-weight: bold !important;
        }
        .btn-back-home:hover {
            background-color: #f8f9fa !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <header class="d-flex justify-content-between align-items-center p-3">
        <h3 class="m-0 text-primary fw-bold d-none d-md-block" style="font-size: 1.5rem; text-shadow: 0 2px 4px rgba(255,255,255,0.8);">
            Shruthi Bandhu
        </h3>
        <div class="d-md-none"></div>

        <button class="btn btn-back-home btn-sm px-3 py-2 rounded-pill" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left me-2"></i>Back to Home
        </button>
    </header>

    <div class="main-content">
        <div class="auth-card">
            <div class="text-center mb-3"> 
                <img src="assets/images/logo.png" alt="Logo" style="height: 60px; width: auto; margin-bottom: 10px;">
                <h3 class="mt-2 fw-bold text-dark">Welcome Back</h3>
            </div>
            
            <form id="login-form">
                <div class="mb-2"> <label class="form-label text-muted small fw-bold mb-1">Email Address</label>
                    <div class="input-group input-group-sm"> <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" id="username" class="form-control border-start-0" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label text-muted small fw-bold mb-1">Password</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control border-start-0" placeholder="Enter password" required>
                    </div>
                </div>
                
                <div class="d-flex justify-content-end mb-3">
                    <button type="button" id="forgot-password" class="btn btn-link text-decoration-none p-0 small fw-bold" style="font-size: 0.85rem;">
                        Forgot Password?
                    </button>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3 rounded shadow-sm">
                    Login
                </button>
            </form>
            <!--
            <div class="d-flex align-items-center mb-3">
                <hr class="flex-grow-1 bg-secondary opacity-25">
                <span class="mx-2 text-muted small">OR</span>
                <hr class="flex-grow-1 bg-secondary opacity-25">
            </div>

            <button id="google-login" class="btn btn-google w-100 mb-3 d-flex align-items-center justify-content-center gap-2 rounded shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18" height="18">
                <span class="small fw-bold">Sign in with Google</span>
            </button>
            -->

            <div class="text-center mt-2 border-top pt-2">
                <p class="mb-0 small text-muted">Don't have an account? <a href="signup.html" class="text-primary text-decoration-none fw-bold">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { login, googleSignIn, forgotPassword } from "./js/auth.js";

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                await login(email, password);
            } catch(err) {
                console.error(err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        document.getElementById("google-login").addEventListener("click", googleSignIn);
        
        document.getElementById("forgot-password").addEventListener("click", () => {
            const email = prompt("Enter your email for password reset:");
            if (email) forgotPassword(email);
        });
    </script>
    <div id="snackbar"></div>
    <script src="js/snackbar.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shruthi Bandhu</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <script type="module" src="js/firebase-config.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){ emailjs.init("4PG_V3DnM0H-xPsLc"); })();
    </script>

    <style>
        body {
            background: #f0f2f5 !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto; /* Ensure scrolling works */
        }
        /* Fix background interference */
        .container, .auth-wrapper { background: none !important; box-shadow: none !important; }
        
        /* Header styling to stay on top */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            /* align-items: center; REMOVED to prevent cutting off top/bottom on small screens */
            padding: 20px;
            padding-top: 80px; /* Push content down so header doesn't cover it */
            padding-bottom: 40px;
        }

        .auth-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e1e4e8;
            margin: auto; /* Centers vertically if there's space */
        }
        .btn-primary { background: #3b82f6 !important; border: none; font-weight: 600; }
        .btn-google { background: white !important; color: #444 !important; border: 1px solid #ddd !important; }
        .btn-back { background: white !important; color: #3b82f6 !important; font-weight: bold; border: none !important; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="p-3 d-flex justify-content-between">
        <h3 class="m-0 text-primary fw-bold d-none d-md-block">Shruthi Bandhu</h3>
        <div class="d-md-none"></div>
        <button class="btn btn-back btn-sm px-3 rounded-pill" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left me-2"></i>Back
        </button>
    </header>

    <div class="main-content">
        <div class="auth-card">
            <div class="text-center mb-3">
                <img src="assets/images/logo.png" alt="Logo" style="height: 60px; width: auto; margin-bottom: 5px;">
                <h3 class="fw-bold text-dark mb-0">Create Account</h3>
                <p class="text-muted small mt-1">Join us today</p>
            </div>
            
            <form id="signup-form">
                
                <div class="mb-2">
                    <label class="form-label text-muted small fw-bold mb-0">Username</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" id="display-name" class="form-control" placeholder="JohnDoe" required>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label text-muted small fw-bold mb-0">Email</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" id="email-input" class="form-control" placeholder="name@email.com" required>
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label text-muted small fw-bold mb-0">Password</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                    </div>
                </div>
                
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <input type="number" id="age" class="form-control form-control-sm" placeholder="Age" required min="10" max="100">
                    </div>
                    <div class="col-6">
                        <select id="gender" class="form-select form-select-sm" required>
                            <option value="" selected disabled>Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-2 rounded shadow-sm">Sign Up</button>
            </form>

            <!--
            <div class="text-center mb-2">
                <span class="text-muted small">OR</span>
            </div>

            <button id="google-signup" class="btn btn-google w-100 mb-3 d-flex align-items-center justify-content-center gap-2 rounded shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                <span class="small fw-bold">Sign up with Google</span>
            </button>
            -->

            <div class="text-center border-top pt-2">
                <p class="mb-0 small text-muted">Have an account? <a href="login.html" class="text-primary fw-bold">Login</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { signup, googleSignIn } from "./js/auth.js";
        document.getElementById("signup-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const username = document.getElementById("display-name").value;
            const email = document.getElementById("email-input").value;
            const password = document.getElementById("password").value;
            const age = document.getElementById("age").value;
            const gender = document.getElementById("gender").value;
            
            signup(email, password, age, gender, username);
        });
        //document.getElementById("google-signup").addEventListener("click", googleSignIn); 
    </script>
    <div id="snackbar"></div>
    <script src="js/snackbar.js"></script>
</body>
</html>
